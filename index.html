<!doctype html>
<html lang="fr">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>SERIE-CAFE — Grey Area</title>

<style>
:root{
  --bg:#0b0b10;
  --text:rgba(255,255,255,.92);
  --muted:rgba(255,255,255,.65);
  --accent:#e50914;
}

*{box-sizing:border-box}
body{
  margin:0;
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
  background:var(--bg);
  color:var(--text);
}

/* HEADER */
.topbar{
  position:fixed;
  top:0; left:0; right:0;
  padding:14px 18px;
  display:flex;
  justify-content:space-between;
  align-items:center;
  background:linear-gradient(to bottom,rgba(0,0,0,.85),rgba(0,0,0,.2),transparent);
  z-index:10;
}
.brand{
  display:flex; align-items:center; gap:10px;
}
.logo{
  width:32px; height:32px;
  border-radius:8px;
  background:linear-gradient(135deg,var(--accent),#ff2ea6);
}
.brand strong{
  font-size:13px;
  letter-spacing:.1em;
}
.brand span{
  font-size:11px;
  color:var(--muted);
}

/* HERO */
.hero{
  padding-top:100px;
  padding-bottom:60px;
  min-height:80vh;
  display:flex;
  align-items:flex-end;
  background:
    radial-gradient(1000px 600px at 20% 30%, rgba(229,9,20,.25), transparent 60%),
    radial-gradient(1000px 600px at 80% 10%, rgba(255,46,166,.15), transparent 60%),
    linear-gradient(180deg, rgba(0,0,0,.1), rgba(0,0,0,.95));
}
.hero-inner{
  max-width:1100px;
  margin:0 auto;
  padding:0 20px;
}
.label{
  display:inline-block;
  padding:8px 14px;
  border-radius:999px;
  background:rgba(0,0,0,.5);
  border:1px solid rgba(255,255,255,.15);
  font-size:12px;
}
h1{
  font-size:clamp(32px,5vw,58px);
  margin:16px 0 10px;
}
.desc{
  max-width:550px;
  font-size:14px;
  color:var(--muted);
}
.actions{
  margin-top:20px;
}
.btn{
  padding:12px 20px;
  border-radius:8px;
  border:none;
  cursor:pointer;
  font-weight:700;
}
.btn-play{
  background:white;
  color:black;
}

/* EPISODES ROW */
.row{
  max-width:1100px;
  margin:40px auto;
  padding:0 20px;
}
.row h2{
  font-size:18px;
  margin-bottom:15px;
}
.cards{
  display:flex;
  gap:16px;
}
.card{
  width:200px;
  height:120px;
  border-radius:12px;
  background:rgba(255,255,255,.05);
  border:1px solid rgba(255,255,255,.1);
  display:flex;
  align-items:flex-end;
  padding:12px;
  font-size:13px;
  color:var(--muted);
}

/* MODAL */
.modal{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,.8);
  backdrop-filter:blur(10px);
  display:none;
  align-items:center;
  justify-content:center;
  padding:20px;
  z-index:100;
}
.modal.open{display:flex;}
.modal-card{
  width:100%;
  max-width:900px;
  border-radius:20px;
  overflow:hidden;
  background:black;
  border:1px solid rgba(255,255,255,.15);
}
.modal-top{
  padding:12px 16px;
  background:rgba(0,0,0,.6);
  display:flex;
  justify-content:space-between;
  align-items:center;
}
.close{
  background:rgba(255,255,255,.1);
  border:1px solid rgba(255,255,255,.2);
  padding:6px 12px;
  border-radius:999px;
  cursor:pointer;
  color:white;
}
.playerWrap{
  aspect-ratio:16/9;
  width:100%;
  position:relative;
}

/* === OPTION A MASQUE VIMEO === */
.playerWrap::after{
  content:"";
  position:absolute;
  left:0; right:0; bottom:0;
  height:70px;
  pointer-events:none;
  background:linear-gradient(to top, rgba(0,0,0,.95), rgba(0,0,0,0));
  z-index:5;
}
.playerWrap iframe{
  width:100%;
  height:100%;
  border:0;
  position:relative;
  z-index:1;
}
</style>
</head>

<body>

<div class="topbar">
  <div class="brand">
    <div class="logo"></div>
    <div>
      <strong>SERIE-CAFE</strong><br>
      <span>Épisode exclusif</span>
    </div>
  </div>
</div>

<section class="hero">
  <div class="hero-inner">
    <div class="label">Épisode 1 • Grey Area</div>
    <h1>Grey Area</h1>
    <p class="desc">Un mini-épisode débloqué pour vous. Bon visionnage.</p>
    <div class="actions">
      <button class="btn btn-play" id="playBtn">Lecture</button>
    </div>
  </div>
</section>

<section class="row">
  <h2>À continuer</h2>
  <div class="cards">
    <div class="card">Épisode 1</div>
    <div class="card">Épisode 2 — Bientôt</div>
    <div class="card">Épisode 3 — Bientôt</div>
  </div>
</section>

<div class="modal" id="modal">
  <div class="modal-card">
    <div class="modal-top">
      <strong>Épisode 1 — Grey Area</strong>
      <button class="close" id="closeBtn">Fermer ✕</button>
    </div>
    <div class="playerWrap">
      <iframe id="player"
        allow="autoplay; fullscreen; picture-in-picture"
        allowfullscreen>
      </iframe>
    </div>
  </div>
</div>

<script>
const VIMEO_ID = "1088679244";
const EMBED = `https://player.vimeo.com/video/${VIMEO_ID}?autoplay=1&title=0&byline=0&portrait=0&badge=0&dnt=1`;

const modal = document.getElementById("modal");
const player = document.getElementById("player");

document.getElementById("playBtn").onclick = () => {
  modal.classList.add("open");
  player.src = EMBED;
  document.body.style.overflow="hidden";
};
document.getElementById("closeBtn").onclick = () => {
  modal.classList.remove("open");
  player.src = "";
  document.body.style.overflow="";
};
modal.onclick = e => { if(e.target === modal){ modal.classList.remove("open"); player.src=""; document.body.style.overflow=""; } }
</script>

</body>
</html>
